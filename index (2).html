      {level:"red",text:"Calculate: (3/4 − 1/3) ÷ 5/6",options:["5/18","1/2","25/72","5/8"],correct:1},
      {level:"red",text:"Find ¾ of £3.60. Express your answer as a fraction of £4.50.",options:["1/2","3/5","2/3","3/4"],correct:1},
    ]
  },
  {
    id:23, title:"Statistics: Averages & Spread",
    questions:[
      {level:"green",text:"Find the mean of: 4, 7, 3, 9, 4, 6, 2, 4",options:["4","4.5","4.875","5"],correct:2},
      {level:"green",text:"What is the mode of: 4, 7, 3, 9, 4, 6, 2, 4?",options:["3","4","4.875","7"],correct:1},
      {level:"amber",text:"Grouped data: 0–10 (f=3), 10–20 (f=7), 20–30 (f=5), 30–40 (f=5). Estimate the mean.",options:["18","20","21","25"],correct:2},
      {level:"amber",text:"15 scores in order: 45,50,55,55,55,60,60,62,68,70,72,75,80,88,90. What is the median?",options:["60","62","68","55"],correct:1},
      {level:"red",text:"The mean of 5 numbers is 14. A 6th number is added and the new mean is 15. What is the 6th number?",options:["15","16","20","25"],correct:2},
    ]
  },
  {
    id:24, title:"Charts: Bar, Pie & Line Graphs",
    questions:[
      {level:"green",text:"30 students chose a subject. Science was chosen by 12. What is Science's angle in a pie chart?",options:["96°","120°","144°","160°"],correct:2},
      {level:"green",text:"Which feature would make a bar chart misleading?",options:["Bars all the same colour","The y-axis does not start at zero","The chart has a title","The bars are the same width"],correct:1},
      {level:"amber",text:"A pie chart has an 80° sector. 240 people were surveyed. How many does that sector represent?",options:["40","53","80","96"],correct:1},
      {level:"red",text:"120 people were surveyed. Football was chosen by 45. What is Football's pie chart angle?",options:["90°","120°","135°","150°"],correct:2},
    ]
  },
  {
    id:25, title:"Indices & Standard Form",
    questions:[
      {level:"green",text:"Calculate: 3² × 3⁴",options:["9⁶","729","243","3⁸"],correct:1},
      {level:"green",text:"Write 4500 in standard form",options:["45 × 10²","4.5 × 10³","0.45 × 10⁴","4.5 × 10⁴"],correct:1},
      {level:"green",text:"Write 0.00072 in standard form",options:["7.2 × 10⁻³","7.2 × 10⁻⁴","0.72 × 10⁻³","72 × 10⁻⁵"],correct:1},
      {level:"amber",text:"Simplify: x⁵ ÷ x²",options:["x³","x⁷","x²·⁵","1"],correct:0},
      {level:"amber",text:"Simplify: (2x³)⁴",options:["8x⁷","16x⁷","16x¹²","2x¹²"],correct:2},
      {level:"amber",text:"Calculate (4.5 × 10⁵) + (3.2 × 10⁴). Give in standard form.",options:["7.7 × 10⁵","4.82 × 10⁵","7.7 × 10⁴","4.82 × 10⁹"],correct:1},
      {level:"red",text:"Calculate (3.2 × 10⁵) × (2.5 × 10³). Give in standard form.",options:["5.7 × 10⁸","8 × 10⁸","8 × 10¹⁵","0.8 × 10⁹"],correct:1},
      {level:"red",text:"Simplify: (3x²y³)² ÷ (9x⁴y)",options:["y⁵","y⁶","x²y⁵","3y⁵"],correct:0},
    ]
  },
  {
    id:26, title:"Scatter Graphs & Correlation",
    questions:[
      {level:"green",text:"What does 'positive correlation' mean?",options:["As one variable increases, the other decreases","As one variable increases, the other also tends to increase","There is no relationship between the variables","The variables are always equal"],correct:1},
      {level:"green",text:"As hours of TV watched increases, exam scores decrease. What type of correlation?",options:["Positive","Negative","No correlation","Perfect positive"],correct:1},
      {level:"amber",text:"A line of best fit passes through (2, 45) and (8, 75). Estimate the score for 5 hours revision.",options:["50","55","60","65"],correct:2},
      {level:"red",text:"A graph shows bigger feet → taller height. A student says 'bigger feet causes greater height.' What is wrong?",options:["The data may have been collected incorrectly","Correlation does not imply causation — both may be caused by a third factor such as age","Shoe size and height are not correlated","The sample size is too small"],correct:1},
      {level:"red",text:"Why is it unreliable to use a line of best fit to predict height for shoe size 20?",options:["The line of best fit is not accurate enough","Shoe size 20 is outside the data range — this is extrapolation","You need more data points first","The correlation is not strong enough"],correct:1},
    ]
  },
];

const levelConfig = {
  green:{label:"Green",color:GREEN,bg:"#f0fdf4",border:"#bbf7d0",emoji:"🟢"},
  amber:{label:"Amber",color:AMBER,bg:"#fffbeb",border:"#fde68a",emoji:"🟡"},
  red:  {label:"Red",  color:RED,  bg:"#fff1f2",border:"#fecdd3",emoji:"🔴"},
};

function loadLS(key,fb){try{const r=localStorage.getItem(key);return r?JSON.parse(r):fb;}catch{return fb;}}
function saveLS(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

const {useState,useEffect} = React;

function QuestionCard({question,qIndex,topicId,answer,onAnswer}){
  const cfg=levelConfig[question.level];
  const answered=answer!==undefined;
  const correct=answer===question.correct;
  return(
    <div style={{borderLeft:`4px solid ${answered?(correct?GREEN:RED):cfg.color}`,background:answered?(correct?"#f0fdf4":"#fff1f2"):"#fff",border:`1px solid ${answered?(correct?"#86efac":"#fca5a5"):cfg.border}`,borderRadius:8,padding:"12px 14px",marginBottom:10,transition:"all 0.2s"}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
        <span style={{fontSize:11,fontWeight:700,color:cfg.color,textTransform:"uppercase",letterSpacing:"0.05em"}}>{cfg.emoji} {cfg.label}</span>
        {answered&&<span style={{fontSize:13,fontWeight:700,color:correct?GREEN:RED,marginLeft:"auto"}}>{correct?"✅ Correct!":"❌ Incorrect"}</span>}
      </div>
      <p style={{margin:"0 0 10px",fontSize:14,color:"#1e293b",lineHeight:1.5,fontWeight:500}}>{qIndex+1}. {question.text}</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {question.options.map((opt,i)=>{
          let bg="#f8fafc",border="#e2e8f0",color="#334155",fw=500;
          if(answered){
            if(i===question.correct){bg="#dcfce7";border=GREEN;color="#166534";fw=700;}
            else if(i===answer&&!correct){bg="#fee2e2";border=RED;color="#991b1b";fw=700;}
            else{bg="#f8fafc";color="#94a3b8";}
          }
          return(
            <button key={i} onClick={()=>!answered&&onAnswer(topicId,qIndex,i)}
              style={{padding:"8px 10px",borderRadius:7,border:`2px solid ${border}`,background:bg,color,fontSize:13,cursor:answered?"default":"pointer",textAlign:"left",fontWeight:fw,display:"flex",alignItems:"center",gap:8,lineHeight:1.3,fontFamily:"inherit"}}>
              <span style={{minWidth:22,height:22,borderRadius:"50%",background:answered&&i===question.correct?GREEN:answered&&i===answer&&!correct?RED:"#e2e8f0",color:answered&&(i===question.correct||(i===answer&&!correct))?"#fff":"#64748b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>
                {LABELS[i]}
              </span>
              {opt}
            </button>
          );
        })}
      </div>
      {answered&&!correct&&(
        <div style={{marginTop:8,padding:"6px 10px",background:"#f0fdf4",borderRadius:6,border:"1px solid #86efac"}}>
          <span style={{fontSize:12,color:GREEN,fontWeight:700}}>✅ Correct answer: </span>
          <span style={{fontSize:12,color:"#166534"}}>{LABELS[question.correct]}. {question.options[question.correct]}</span>
        </div>
      )}
    </div>
  );
}

function TopicSection({topic,answers,onAnswer}){
  const [open,setOpen]=useState(false);
  const total=topic.questions.length;
  const attempted=topic.questions.filter((_,i)=>answers[`${topic.id}-${i}`]!==undefined).length;
  const correct=topic.questions.filter((q,i)=>answers[`${topic.id}-${i}`]===q.correct).length;
  const pct=attempted>0?Math.round((correct/total)*100):0;
  return(
    <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",marginBottom:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div onClick={()=>setOpen(!open)} style={{padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,userSelect:"none",background:open?"#f8fafc":"#fff",borderBottom:open?"1px solid #e2e8f0":"none"}}>
        <span style={{fontSize:18,transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:700,color:"#1e293b"}}>{topic.title}</h3>
            <span style={{fontSize:11,color:"#64748b"}}>🟢{topic.questions.filter(q=>q.level==="green").length} 🟡{topic.questions.filter(q=>q.level==="amber").length} 🔴{topic.questions.filter(q=>q.level==="red").length}</span>
          </div>
          <div style={{marginTop:6,display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,height:6,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${attempted>0?pct:0}%`,background:pct>=80?GREEN:pct>=50?AMBER:"#94a3b8",borderRadius:3,transition:"width 0.3s"}}/>
            </div>
            <span style={{fontSize:12,color:"#64748b",whiteSpace:"nowrap"}}>{attempted>0?`${correct}/${total} correct`:"Not started"}</span>
          </div>
        </div>
        {attempted===total&&<span style={{fontSize:20}}>{pct>=80?"🌟":pct>=50?"👍":"📝"}</span>}
      </div>
      {open&&(
        <div style={{padding:"14px 18px"}}>
          {topic.questions.map((q,i)=>(
            <QuestionCard key={i} question={q} qIndex={i} topicId={topic.id} answer={answers[`${topic.id}-${i}`]} onAnswer={onAnswer}/>
          ))}
        </div>
      )}
    </div>
  );
}

function App(){
  const [answers,setAnswers]=useState(()=>loadLS(STORAGE_KEY_ANSWERS,{}));
  const [studentName,setStudentName]=useState(()=>loadLS(STORAGE_KEY_NAME,""));
  const [filter,setFilter]=useState("all");
  const [sent,setSent]=useState(false);
  const [saveFlash,setSaveFlash]=useState(false);

  useEffect(()=>{saveLS(STORAGE_KEY_ANSWERS,answers);setSaveFlash(true);const t=setTimeout(()=>setSaveFlash(false),2000);return()=>clearTimeout(t);},[answers]);
  useEffect(()=>{saveLS(STORAGE_KEY_NAME,studentName);},[studentName]);

  const onAnswer=(topicId,qIndex,choice)=>{setAnswers(prev=>({...prev,[`${topicId}-${qIndex}`]:choice}));setSent(false);};

  const totalQ=topics.reduce((s,t)=>s+t.questions.length,0);
  const attemptedQ=Object.keys(answers).length;
  const correctQ=topics.reduce((s,t)=>s+t.questions.filter((q,i)=>answers[`${t.id}-${i}`]===q.correct).length,0);
  const pct=Math.round((attemptedQ/totalQ)*100);

  const statsByLevel=level=>{
    const qs=topics.flatMap(t=>t.questions.map((q,i)=>({q,t,i})).filter(x=>x.q.level===level));
    return{total:qs.length,correct:qs.filter(({q,t,i})=>answers[`${t.id}-${i}`]===q.correct).length,attempted:qs.filter(({t,i})=>answers[`${t.id}-${i}`]!==undefined).length};
  };
  const gS=statsByLevel("green"),aS=statsByLevel("amber"),rS=statsByLevel("red");

  const buildEmail=()=>{
    const name=studentName.trim()||"Unknown Student";
    const date=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
    const lv=q=>q.level==="green"?"🟢":q.level==="amber"?"🟡":"🔴";
    let b=`GCSE Maths Foundation Diagnostic Results\nStudent: ${name}\nDate: ${date}\n${"=".repeat(50)}\n\n`;
    b+=`OVERALL SUMMARY\nAnswered: ${attemptedQ} / ${totalQ}\nCorrect: ${correctQ} / ${attemptedQ} (${attemptedQ>0?Math.round(correctQ/attemptedQ*100):0}%)\n\n`;
    b+=`🟢 Green: ${gS.correct}/${gS.total} correct\n🟡 Amber: ${aS.correct}/${aS.total} correct\n🔴 Red: ${rS.correct}/${rS.total} correct\n\n`;
    b+=`${"=".repeat(50)}\n\nTOPIC BREAKDOWN\n\n`;
    topics.forEach(t=>{
      const tc=t.questions.filter((q,i)=>answers[`${t.id}-${i}`]===q.correct).length;
      const ta=t.questions.filter((_,i)=>answers[`${t.id}-${i}`]!==undefined).length;
      const wrong=t.questions.map((q,i)=>({q,i})).filter(({q,i})=>answers[`${t.id}-${i}`]!==undefined&&answers[`${t.id}-${i}`]!==q.correct);
      const skipped=t.questions.map((q,i)=>({q,i})).filter(({i})=>answers[`${t.id}-${i}`]===undefined);
      b+=`${t.title}\nScore: ${tc}/${t.questions.length} | ${ta} attempted\n`;
      if(ta===0){b+=`  ⬜ Not yet attempted\n`;}
      else if(wrong.length===0&&skipped.length===0){b+=`  ✅ All correct!\n`;}
      else{
        if(wrong.length>0){b+=`  ❌ Got wrong:\n`;wrong.forEach(({q,i})=>{const th=answers[`${t.id}-${i}`];b+=`    ${lv(q)} Q${i+1}: ${q.text}\n       Their answer: ${LABELS[th]}. ${q.options[th]}\n       Correct: ${LABELS[q.correct]}. ${q.options[q.correct]}\n`;});}
        if(skipped.length>0){b+=`  ⬜ Not attempted:\n`;skipped.forEach(({q,i})=>{b+=`    ${lv(q)} Q${i+1}: ${q.text}\n`;});}
      }
      b+=`\n`;
    });
    b+=`${"=".repeat(50)}\nSent from GCSE Maths Foundation Diagnostic Tool\n`;
    return`mailto:${TEACHER_EMAIL}?subject=${encodeURIComponent(`Maths Diagnostic — ${name} — ${date}`)}&body=${encodeURIComponent(b)}`;
  };

  const handleSend=()=>{if(!studentName.trim()){alert("Please type your name first!");return;}window.location.href=buildEmail();setSent(true);};
  const filteredTopics=filter==="incomplete"?topics.filter(t=>t.questions.some((_,i)=>answers[`${t.id}-${i}`]===undefined)):topics;

  return(
    <div style={{fontFamily:"system-ui,sans-serif",background:"#f1f5f9",minHeight:"100vh",padding:"20px 16px"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>

        <div style={{background:"linear-gradient(135deg,#1e3a5f,#1e40af)",borderRadius:16,padding:"24px 28px",marginBottom:20,color:"#fff",boxShadow:"0 4px 20px rgba(30,58,138,0.3)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:4}}>
            <h1 style={{margin:0,fontSize:22,fontWeight:800}}>GCSE Maths Foundation — Diagnostic Quiz</h1>
            {saveFlash&&<span style={{fontSize:12,background:"rgba(74,222,128,0.25)",color:"#4ade80",padding:"4px 10px",borderRadius:20,fontWeight:700}}>✓ Saved</span>}
          </div>
          <p style={{margin:"0 0 16px",fontSize:13,opacity:0.8}}>OCR J560 · 26 Topics · {totalQ} Questions · Progress saved automatically</p>
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:13,fontWeight:700,marginBottom:6,opacity:0.9}}>✏️ Your name</label>
            <input type="text" value={studentName} onChange={e=>{setStudentName(e.target.value);setSent(false);}} placeholder="Type your full name here..."
              style={{width:"100%",padding:"10px 14px",borderRadius:8,border:studentName.trim()?"2px solid #4ade80":"2px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.15)",fontSize:15,outline:"none",boxSizing:"border-box",fontWeight:600}}/>
          </div>
          <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:700}}>Progress</span>
              <span style={{fontSize:13,fontWeight:700}}>{attemptedQ}/{totalQ} answered · {correctQ} correct</span>
            </div>
            <div style={{height:8,background:"rgba(255,255,255,0.3)",borderRadius:4,overflow:"hidden",marginBottom:12}}>
              <div style={{height:"100%",width:`${pct}%`,background:"#4ade80",borderRadius:4,transition:"width 0.3s"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[{label:"🟢 Easy",s:gS},{label:"🟡 Medium",s:aS},{label:"🔴 Hard",s:rS}].map(({label,s})=>(
                <div key={label} style={{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontSize:11,opacity:0.85,marginBottom:2}}>{label}</div>
                  <div style={{fontSize:15,fontWeight:800}}>{s.correct}<span style={{fontSize:11,fontWeight:400,opacity:0.7}}>/{s.total} ✓</span></div>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div style={{marginBottom:16}}>
          <button onClick={handleSend} style={{width:"100%",padding:16,borderRadius:12,border:"none",background:sent?"#16a34a":"linear-gradient(135deg,#0ea5e9,#2563eb)",color:"#fff",fontSize:17,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 14px rgba(37,99,235,0.35)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontFamily:"inherit"}}>
            <span style={{fontSize:22}}>{sent?"✅":"📧"}</span>
            {sent?"Results sent! Well done.":"Send my results to my teacher"}
          </button>
          <p style={{textAlign:"center",fontSize:12,color:"#94a3b8",margin:"6px 0 0"}}>Tap this to open your email app — it will already be filled in. Just tap Send.</p>
        </div>

        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          {["green","amber","red"].map(l=>(
            <div key={l} style={{background:levelConfig[l].bg,border:`1px solid ${levelConfig[l].border}`,borderRadius:8,padding:"6px 12px",fontSize:12,color:levelConfig[l].color,fontWeight:600,flex:1,minWidth:140}}>
              {levelConfig[l].emoji} {l==="green"?"Green = Easy basics":l==="amber"?"Amber = Medium":"Red = Harder"}
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[{val:"all",label:"All Topics"},{val:"incomplete",label:"Not Finished Yet"}].map(f=>(
            <button key={f.val} onClick={()=>setFilter(f.val)} style={{padding:"6px 16px",borderRadius:8,border:"1px solid #cbd5e1",background:filter===f.val?"#1e3a5f":"#fff",color:filter===f.val?"#fff":"#475569",fontSize:13,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>
              {f.label}
            </button>
          ))}
        </div>

        {filteredTopics.map(topic=>(
          <TopicSection key={topic.id} topic={topic} answers={answers} onAnswer={onAnswer}/>
        ))}

        <div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:12}}>
          OCR GCSE Mathematics Foundation Tier J560 · Answers saved automatically · Come back any time
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
